<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steuerbericht 2025 - IBKR Anlage KAP</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css" />
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";
        mount({
            entrypoint: "app.py",
            files: {
                "app.py": { url: "./app.py" },
                "extract_ibkr_data.py": { url: "./extract_ibkr_data.py" },
                "calculate_tax_report.py": { url: "./calculate_tax_report.py" }
            },
            streamlitConfig: {
                "client.toolbarMode": "minimal",
                "theme.base": "dark"
            }
        }, document.getElementById("root"));
    </script>
</body>
</html>
